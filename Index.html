<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RODS — Mondelez India | Investor Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#030508;--bg1:#070B12;--bg2:#0B1119;--bg3:#101722;--bg4:#161E2C;
  --c1:#EEF2FF;--c2:#8B9BB4;--c3:#3D5068;--c4:#1E2D42;
  --g:#00D97E;--g2:rgba(0,217,126,0.1);--g3:rgba(0,217,126,0.2);--gg:rgba(0,217,126,0.06);
  --am:#F0A500;--am2:rgba(240,165,0,0.1);--am3:rgba(240,165,0,0.2);
  --re:#E8475F;--re2:rgba(232,71,95,0.1);--re3:rgba(232,71,95,0.2);
  --bl:#3B8BF5;--bl2:rgba(59,139,245,0.1);--bl3:rgba(59,139,245,0.2);
  --vi:#8B6EF5;--vi2:rgba(139,110,245,0.1);--vi3:rgba(139,110,245,0.2);
  --te:#00C4B4;--te2:rgba(0,196,180,0.1);
  --pk:#E879A8;--pk2:rgba(232,121,168,0.1);
  --bd:rgba(255,255,255,0.055);--bd2:rgba(255,255,255,0.09);--bd3:rgba(255,255,255,0.14);
  --fn:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mo:'JetBrains Mono','Fira Code',monospace;
  --r6:6px;--r10:10px;--r14:14px;--r20:20px;
  --role-color:#00D97E;--role-bg:rgba(0,217,126,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--c1);font-family:var(--fn);font-size:13px;line-height:1.5}

/* APP SHELL */
.app{display:flex;height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;position:relative}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:240px;background:linear-gradient(180deg,rgba(var(--role-r),var(--role-g2),var(--role-b),.06) 0%,transparent 100%);pointer-events:none;transition:background .4s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg0)}
.topbar{height:54px;background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px;background-image:radial-gradient(rgba(255,255,255,.016) 1px,transparent 1px);background-size:26px 26px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px}
.rpanel{width:368px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--bd);display:none;flex-direction:column}
.rpanel.open{display:flex}

/* BRAND */
.brand{padding:18px 16px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.brand-mark{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.brand-mark::before{content:'';position:absolute;inset:0;background:var(--role-color);opacity:.15;border-radius:10px}
.brand-mark svg{width:16px;height:16px;position:relative;z-index:1}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.5px}
.brand-sub{font-size:9px;color:var(--c3);letter-spacing:.9px;text-transform:uppercase;margin-top:1px}

/* ROLE SWITCHER */
.role-zone{padding:10px 12px 9px;border-bottom:1px solid var(--bd);position:relative;z-index:10}
.rz-label{font-size:9px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--c4);margin-bottom:5px}
.rz-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r10);cursor:pointer;transition:border-color .18s}
.rz-pill:hover{border-color:var(--bd2)}
.rz-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;background:var(--role-bg);color:var(--role-color)}
.rz-name{flex:1;font-size:11px;font-weight:500;color:var(--c1)}
.rz-drop{display:none;position:absolute;left:10px;right:10px;top:calc(100%+3px);background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r14);z-index:200;box-shadow:0 20px 60px rgba(0,0,0,.8);overflow:hidden}
.rdrop-row{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;transition:background .13s;border-bottom:1px solid var(--bd)}
.rdrop-row:last-child{border-bottom:none}
.rdrop-row:hover{background:rgba(255,255,255,.03)}
.rdrop-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rdrop-info .t{font-size:12px;font-weight:500;color:var(--c1)}
.rdrop-info .s{font-size:10px;color:var(--c3)}
.rdrop-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:auto}

/* NAVIGATION */
.nav-wrap{flex:1;padding:10px 8px;overflow-y:auto;position:relative;z-index:1}
.nav-section-lbl{font-size:9px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--c4);padding:0 8px;margin:10px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--r10);font-size:12px;color:var(--c2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .16s;position:relative;margin-bottom:2px;font-family:var(--fn)}
.ni svg{width:14px;height:14px;flex-shrink:0;opacity:.55;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni:hover{background:rgba(255,255,255,.04);color:var(--c1)}
.ni:hover svg{opacity:.8}
.ni.act{background:var(--role-bg);color:var(--role-color);font-weight:500}
.ni.act svg{opacity:1;stroke:var(--role-color)}
.ni.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--role-color);border-radius:0 3px 3px 0}
.nbadge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;line-height:1.4}
.nb-red{background:var(--re);color:#fff}.nb-am{background:var(--am);color:#1a0a00}

/* USER FOOT */
.sb-foot{padding:10px 8px;border-top:1px solid var(--bd);position:relative;z-index:1}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r10)}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--role-bg);color:var(--role-color)}
.u-name{font-size:11px;font-weight:500;color:var(--c1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-zone{font-size:10px;color:var(--c3)}

/* TOPBAR */
.tb-title{font-size:14px;font-weight:600;letter-spacing:-.3px;flex:1;color:var(--c1)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:10px;color:var(--c2)}
.tb-live-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:livepulse 2s infinite}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,126,.5)}70%{box-shadow:0 0 0 5px rgba(0,217,126,0)}}
.tb-role-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bd2);background:var(--role-bg);color:var(--role-color)}

/* ACCESS INDICATOR — role scope bar */
.access-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);font-size:11px;color:var(--c2);flex-shrink:0}
.access-bar .ab-label{color:var(--role-color);font-weight:600;margin-right:2px}
.ab-sep{color:var(--c4);margin:0 4px}
.ab-restricted{color:var(--re);font-size:10px;display:flex;align-items:center;gap:4px}
.ab-full{color:var(--g);font-size:10px;display:flex;align-items:center;gap:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r10);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--c1);transition:all .15s;font-family:var(--fn);white-space:nowrap}
.btn:hover{background:var(--bg3);border-color:var(--bd2)}
.btn:active{transform:scale(.98)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.btn-primary{background:var(--g);border-color:var(--g);color:#021A0A;font-weight:700}
.btn-primary:hover{filter:brightness(1.08)}
.btn-danger{background:var(--re2);border-color:var(--re3);color:var(--re)}
.btn-danger:hover{background:rgba(232,71,95,.18)}
.btn-warn{background:var(--am2);border-color:var(--am3);color:var(--am)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--c3);padding:5px 9px;font-size:11px}
.btn-ghost:hover{background:rgba(255,255,255,.05);color:var(--c1)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;border:1px solid}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-raised{background:var(--bl2);color:var(--bl);border-color:var(--bl3)}.b-raised::before{background:var(--bl)}
.b-inspected{background:var(--am2);color:var(--am);border-color:var(--am3)}.b-inspected::before{background:var(--am);animation:bk 1.5s infinite}
.b-approved{background:var(--g2);color:var(--g);border-color:var(--g3)}.b-approved::before{background:var(--g)}
.b-rejected{background:var(--re2);color:var(--re);border-color:var(--re3)}.b-rejected::before{background:var(--re)}
.b-credit{background:var(--g2);color:var(--g);border-color:var(--g3)}.b-credit::before{background:var(--g);animation:bk 1.5s infinite}
.b-transit{background:var(--vi2);color:var(--vi);border-color:var(--vi3)}.b-transit::before{background:var(--vi);animation:bk 1.5s infinite}
.b-received{background:var(--te2);color:var(--te);border-color:rgba(0,196,180,.2)}.b-received::before{background:var(--te)}
.b-disposed{background:rgba(255,255,255,.06);color:var(--c3);border-color:var(--bd)}.b-disposed::before{background:var(--c3)}
.b-fraud{background:var(--re2);color:var(--re);border-color:var(--re3)}.b-fraud::before{background:var(--re);animation:bk .7s infinite}
.b-tpa{background:var(--pk2);color:var(--pk);border-color:rgba(232,121,168,.2)}.b-tpa::before{background:var(--pk)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}

/* METRIC CARDS */
.mgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.mgrid.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mgrid.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.mcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r14);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .18s,transform .18s;cursor:default}
.mcard:hover{border-color:var(--bd2);transform:translateY(-1px)}
.mcard-glow{position:absolute;top:-24px;right:-24px;width:80px;height:80px;border-radius:50%;opacity:.07}
.mcard-icon{width:32px;height:32px;border-radius:var(--r10);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.mcard-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.mcard-val{font-size:28px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.mcard-label{font-size:11px;color:var(--c2);margin-bottom:8px}
.mcard-trend{font-size:10px;display:flex;align-items:center;gap:4px;padding-top:8px;border-top:1px solid var(--bd)}
.tup{color:var(--g)}.tdn{color:var(--re)}.tnu{color:var(--am)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r14);overflow:hidden;margin-bottom:12px}
.card:last-child{margin-bottom:0}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.2px;color:var(--c1)}
.card-sub{font-size:11px;color:var(--c3);margin-top:2px}
.card-body{padding:18px}

/* RESTRICTED CARD */
.card-locked{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r14);overflow:hidden;margin-bottom:12px;opacity:.45;position:relative}
.card-locked::after{content:'🔒 Access Restricted — '+ attr(data-role);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--re);background:rgba(3,5,8,.7);font-weight:500}

/* ACCESS DENIED PANEL */
.access-denied{border:1px solid var(--re3);background:var(--re2);border-radius:var(--r14);padding:16px 18px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ad-icon{width:32px;height:32px;border-radius:50%;background:rgba(232,71,95,.15);display:flex;align-items:center;justify-content:center;color:var(--re);font-size:14px;flex-shrink:0}
.ad-text{font-size:12px;color:var(--re);font-weight:500}
.ad-sub{font-size:11px;color:rgba(232,71,95,.7);margin-top:2px}

/* DATA TABLE */
.dtbl{width:100%;border-collapse:collapse}
.dtbl thead th{padding:9px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--c3);border-bottom:1px solid var(--bd);white-space:nowrap}
.dtbl tbody tr{cursor:pointer;transition:background .13s;border-bottom:1px solid var(--bd)}
.dtbl tbody tr:last-child{border-bottom:none}
.dtbl tbody tr:hover{background:rgba(255,255,255,.02)}
.dtbl td{padding:10px 16px;font-size:12px;vertical-align:middle;color:var(--c1)}
.td-mu{color:var(--c2);font-size:11px}
.td-id{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.2px}

/* PANEL */
.rp-head{padding:16px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.rp-body{flex:1;overflow-y:auto;padding:16px 18px}
.rp-body::-webkit-scrollbar{width:3px}.rp-body::-webkit-scrollbar-thumb{background:var(--bd2)}
.rp-foot{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0}
.rp-close{width:28px;height:28px;border-radius:var(--r6);background:none;border:none;color:var(--c3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .14s}
.rp-close:hover{background:rgba(255,255,255,.06);color:var(--c1)}
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bd);gap:8px;font-size:12px}
.dr:last-child{border-bottom:none}
.dk{color:var(--c3);font-size:11px;flex-shrink:0}
.dv{font-weight:500;color:var(--c1);text-align:right;word-break:break-all;max-width:200px}
.dsect{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--c4);margin:14px 0 8px}

/* TIMELINE */
.tl{display:flex;align-items:center;margin-bottom:16px}
.tl-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.tl-dot{width:9px;height:9px;border-radius:50%;border:2px solid var(--bd2);background:var(--bg0);z-index:1;position:relative}
.tl-dot.done{background:var(--g);border-color:var(--g);box-shadow:0 0 7px rgba(0,217,126,.4)}
.tl-dot.curr{background:var(--am);border-color:var(--am);animation:bk 1.5s infinite}
.tl-lbl{font-size:8px;color:var(--c3);text-align:center;line-height:1.2;max-width:40px}
.tl-lbl.done{color:var(--g)}.tl-lbl.curr{color:var(--am)}
.tl-line{flex:1;height:1px;background:var(--bd);margin-top:-12px;min-width:6px}
.tl-line.done{background:var(--g)}

/* FORMS */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:500;color:var(--c2);margin-bottom:5px}
.fi,.fsel{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r10);font-size:12px;color:var(--c1);outline:none;transition:border-color .15s;font-family:var(--fn)}
.fi:focus,.fsel:focus{border-color:var(--role-color)}
.fi::placeholder{color:var(--c4)}
.fsel option{background:var(--bg3)}
textarea.fi{resize:vertical;min-height:68px}

/* ROLE HIERARCHY SECTION */
.hierarchy-bar{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r14);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:0}
.hb-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.hb-node-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid;transition:all .2s}
.hb-node-lbl{font-size:9px;color:var(--c3);text-align:center;line-height:1.3}
.hb-arrow{color:var(--c4);font-size:12px;flex-shrink:0;margin:0 4px;margin-bottom:16px}
.hb-node.me .hb-node-circle{background:var(--role-bg);border-color:var(--role-color);color:var(--role-color);box-shadow:0 0 12px rgba(0,0,0,0) }
.hb-node.me .hb-node-lbl{color:var(--role-color);font-weight:600}

/* PIPELINE */
.pipeline{display:flex;border:1px solid var(--bd);border-radius:var(--r14);overflow:hidden}
.pipe-s{flex:1;padding:14px 12px;border-right:1px solid var(--bd)}
.pipe-s:last-child{border-right:none}
.pipe-num{font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:3px}
.pipe-lbl{font-size:10px;color:var(--c3);margin-bottom:6px}
.pipe-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.pipe-fill{height:100%;border-radius:2px;transition:width .9s ease}

/* LAYOUT HELPERS */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g2:last-child,.g3:last-child{margin-bottom:0}

/* MISC */
.tag{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;background:rgba(255,255,255,.05);color:var(--c2);border:1px solid var(--bd)}
.sep{height:1px;background:var(--bd);margin:10px 0}
.es{padding:36px 20px;text-align:center;color:var(--c3);font-size:12px}
.es-icon{font-size:26px;margin-bottom:8px;opacity:.4}

/* ALERT */
.alert{border-radius:var(--r10);padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.6;border-left:3px solid;background:var(--bg3);border-top:none;border-right:none;border-bottom:none;border-radius:0 var(--r10) var(--r10) 0}
.ag{border-color:var(--g);color:var(--c2)}.ag strong{color:var(--g)}
.aa{border-color:var(--am)}.aa strong{color:var(--am);color:var(--c2)}.aa{color:var(--c2)}
.ar{border-color:var(--re);color:var(--c2)}.ar strong{color:var(--re)}
.ab{border-color:var(--bl);color:var(--c2)}.ab strong{color:var(--bl)}
.av{border-color:var(--vi);color:var(--c2)}.av strong{color:var(--vi)}

/* BAR CHART */
.barchart{display:flex;flex-direction:column;gap:9px}
.brow{display:flex;align-items:center;gap:8px}
.blbl{width:100px;font-size:10px;color:var(--c2);text-align:right;flex-shrink:0}
.btrack{flex:1;height:16px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;color:rgba(0,0,0,.6);transition:width .9s cubic-bezier(.4,0,.2,1);min-width:20px}
.bval{width:22px;font-size:10px;color:var(--c1);flex-shrink:0;text-align:right}

/* FEED */
.fi2{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.fi2:last-child{border-bottom:none}
.fi2-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}

.fi2-text strong{color:var(--c1);font-weight:500}
.fi2-time{font-size:10px;color:var(--c3);margin-top:2px}

/* STAT ROW */
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.srow:last-child{border-bottom:none}
.sk{font-size:11px;color:var(--c3)}
.sv{font-size:12px;font-weight:600;color:var(--g)}
.sn{font-size:10px;color:var(--c3);text-align:right;margin-top:2px}

/* FRAUD */
.fraud-card{background:var(--re2);border:1px solid var(--re3);border-radius:var(--r14);padding:14px;margin-bottom:10px}

/* EXPIRY */
.ecard{border:1px solid var(--bd);border-radius:var(--r10);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ecard.crit{border-color:var(--re3);background:var(--re2)}
.ecard.warn{border-color:var(--am3);background:var(--am2)}

/* DISP */
.disp-opt{border:1px solid var(--bd);border-radius:var(--r14);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .16s;display:flex;align-items:flex-start;gap:10px}
.disp-opt:hover{border-color:var(--bd2)}
.disp-opt.sel{border-color:var(--g);background:var(--gg)}

/* CN */
.cn-box{background:linear-gradient(135deg,rgba(0,217,126,.1),rgba(0,217,126,.04));border:1px solid var(--g3);border-radius:var(--r14);padding:14px;margin-bottom:12px}

/* UPLOAD */
.upz{border:1.5px dashed var(--bd2);border-radius:var(--r14);padding:18px;text-align:center;color:var(--c3);font-size:11px;cursor:pointer;transition:all .16s}
.upz:hover{border-color:var(--g);color:var(--g);background:var(--gg)}

/* MOBILE FRAME */
.mf{width:220px;background:var(--bg3);border-radius:26px;border:2px solid var(--bd2);padding:10px;margin:0 auto}
.mn-notch{width:55px;height:5px;background:var(--bd2);border-radius:3px;margin:0 auto 10px}
.ms{background:var(--bg0);border-radius:15px;overflow:hidden;min-height:290px}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;padding:11px 16px;border-radius:var(--r10);font-size:12px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .26s;pointer-events:none;max-width:300px;border:1px solid}
.t-g{background:var(--g2);color:var(--g);border-color:var(--g3)}
.t-r{background:var(--re2);color:var(--re);border-color:var(--re3)}
.t-b{background:var(--bl2);color:var(--bl);border-color:var(--bl3)}
.t-a{background:var(--am2);color:var(--am);border-color:var(--am3)}
#toast.show{opacity:1;transform:translateY(0)}

/* ANIMS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .28s ease both}
.d1{animation-delay:.04s;opacity:0}.d2{animation-delay:.08s;opacity:0}.d3{animation-delay:.13s;opacity:0}.d4{animation-delay:.18s;opacity:0}.d5{animation-delay:.23s;opacity:0}.d6{animation-delay:.28s;opacity:0}

/* MIRANET */
.mrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.mrow:last-child{border-bottom:none}

/* FR TAG */
.ftag{display:inline-flex;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:var(--bl2);color:var(--bl);border:1px solid var(--bl3);letter-spacing:.3px;margin-right:3px}

// ═══ SCOPED DATA ═══
function myReturns(){
  if(curRole==='SP') return returns.filter(r=>r.sp_id==='SP001');
  if(curRole==='RD') return returns.filter(r=>r.rd_id==='RD-MUM-01');
  if(curRole==='DC') return returns.filter(r=>r.dc==='West DC');
  if(curRole==='TPA') return returns.filter(r=>r.tpa&&r.tpa_assigned&&r.tpa_assigned.includes('Arun'));
  return returns; // FIN sees all
}
function myCredits(){
  if(curRole==='SP') return creditNotes.filter(c=>myReturns().some(r=>r.id===c.ret));

  if(curRole==='DC') return creditNotes.filter(c=>c.dc==='West DC');
  return creditNotes;
}

function renderAnalytics(){

  returns.forEach(r=>byR[r.reason]=(byR[r.reason]||0)+1);
  const mxR=Math.max(...Object.values(byR),1);
  const RC={EXPIRED:'var(--re)',DAMAGED_TRANSIT:'var(--am)',DAMAGED_HANDLING:'var(--am)',NEAR_EXPIRY_UNSOLD:'var(--bl)'};
  const bySt={};returns.forEach(r=>bySt[r.status]=(bySt[r.status]||0)+1);

  document.getElementById('content').innerHTML=`

    <div class="card"><div class="card-hdr"><div class="card-title">Status Distribution</div></div><div class="card-body"><div class="barchart">${Object.entries(bySt).map(([k,v])=>`<div class="brow"><div class="blbl" style="font-size:9px">${SL[k]||k}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/mxS*100)}%;background:var(--g)">${v}</div></div></div>`).join('')}</div></div></div>
    <div class="card"><div class="card-hdr"><div class="card-title">By RD Territory</div></div><div class="card-body"><div class="barchart">${[['Mumbai Central',returns.filter(r=>r.rd.includes('Mumbai')).length],['Pune West',returns.filter(r=>r.rd.includes('Pune')).length],['Delhi North',returns.filter(r=>r.rd.includes('Delhi')).length]].map(([k,v])=>`<div class="brow"><div class="blbl" style="font-size:9px">${k}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/tot*100)}%;background:var(--vi)">${v}</div></div></div>`).join('')}</div></div></div>

// ═══ SIDE PANEL ═══
function renderPanel(){
  if(!selId)return;
  const r=returns.find(x=>x.id===selId);if(!r)return;
  const s=skuO(r.sku);
  const cn=creditNotes.find(c=>c.ret===r.id);
  const idx=SO.indexOf(r.status);
  const canI=curRole==='RD'&&r.status==='RAISED';
  const canA=curRole==='RD'&&r.status==='INSPECTED';
  const canRej=curRole==='RD'&&(r.status==='RAISED'||r.status==='INSPECTED');

  document.getElementById('ph').innerHTML=`<div><div style="font-size:14px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px">${r.id}</div><div style="display:flex;gap:5px;flex-wrap:wrap">${bdg(r.status)} ${r.fraud?'<span class="badge b-fraud">⚑ Fraud</span>':''} ${r.tpa?'<span class="badge b-tpa">TPA</span>':''}</div></div>`;

  const tl=`<div class="dsect">Lifecycle (FR-06)</div><div class="tl">${SO.filter(s=>s!=='REJECTED').map((st,i)=>{
    const done=idx>SO.indexOf(st)||(['CREDIT_ISSUED','APPROVED','RECEIVED','DISPOSED'].includes(st)&&st===r.status);
    const curr=r.status===st&&!done;
    return`${i>0?`<div class="tl-line${(done||idx>i)?' done':''}"></div>`:''}
    <div class="tl-step"><div class="tl-dot${done?' done':curr?' curr':''}"></div><div class="tl-lbl${done?' done':curr?' curr':''}">${st.replace('_','<br>')}</div></div>`;
  }).join('')}</div>`;

  const mW=r.claimed>r.miranet_disp?`<div style="background:var(--re2);border:1px solid var(--re3);border-radius:var(--r10);padding:10px 13px;margin-bottom:10px;font-size:11px;color:var(--re);line-height:1.6"><strong>⚠ Miranet Alert</strong><br>Claimed ${r.claimed} > dispatch ${r.miranet_disp} (+${Math.round((r.claimed-r.miranet_disp)/r.miranet_disp*100)}%). Verify before approving.</div>`:'';
  const fW=r.fraud?`<div style="background:var(--re2);border:1px solid var(--re3);border-radius:var(--r10);padding:10px 13px;margin-bottom:10px;font-size:11px;color:var(--re);line-height:1.6"><strong>⚑ Fraud Flag (FR-15)</strong><br>${r.fraud_reason}</div>`:'';

  const cnBlock=cn?`<div class="cn-box"><div style="font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--g);margin-bottom:8px">Credit Note Issued — FR-05</div>
  ${[['Note ID',cn.id],['Net','₹'+fmt(cn.net)],['GST @'+cn.gst_rate+'%','₹'+fmt(cn.gst_amt)],['Total','₹'+fmt(cn.total)]].map(([k,v],i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:${i<3?'1px solid rgba(0,217,126,.12)':'none'}"><span style="color:rgba(0,217,126,.6);font-size:11px">${k}</span><span style="color:var(--g);font-weight:${i===3?700:500};font-size:${i===3?16:12}px">${v}</span></div>`).join('')}
  <button class="btn" style="width:100%;margin-top:9px;font-size:11px" onclick="toast('PDF sent via WhatsApp to +91-'+r.phone,'b')">${ico('dl')} PDF · WhatsApp</button></div>`:
  `<div class="alert ag" style="margin-bottom:11px">Credit note auto-generated on approval: ${r.inspected||r.claimed} × ₹${s.unit_price} + ${s.gst_rate}% GST</div>`;

  const dets=`<div class="dsect">Return Details</div>${[['Retailer',r.retailer],['Phone',r.phone||'—'],['Salesperson',r.sp],['RD',r.rd],['DC',r.dc],['SKU',s.name],['Unit Price','₹'+s.unit_price],['GST Rate',s.gst_rate+'%'],['Batch',r.batch],['Reason',RES[r.reason].l],['Claimed',r.claimed+' units'],['Miranet Disp.',r.miranet_disp+' units'],['Inspected',r.inspected!=null?r.inspected+' units':'—'],['Approved',r.approved!=null?r.approved+' units':'—'],['GPS',r.gps||'—'],['Date',r.date]].map(([k,v])=>`<div class="dr"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('')}`;

  const form=canI?`<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r14);padding:13px;margin-top:11px"><div style="font-size:12px;font-weight:600;margin-bottom:8px">Record Inspection — FR-03</div>
  <div class="fg"><label class="fl">Verified qty (claimed: ${r.claimed} · Miranet: ${r.miranet_disp})</label><input class="fi" id="piq" type="number" min="0" max="${r.claimed}" placeholder="${r.claimed}"></div>
  <div class="fg" style="margin-bottom:0"><label class="fl">Miranet dispatch ref (auto-filled in prod)</label><input class="fi" placeholder="DISPATCH-2604-XXXX"></div></div>`:
  canA?`<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r14);padding:13px;margin-top:11px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">Approve Return — FR-03</div>
  <div style="font-size:12px;color:var(--c2);margin-bottom:8px">Inspected: <strong style="color:var(--g)">${r.inspected} units</strong> — partial approval allowed</div>
  <input class="fi" id="paq" type="number" min="0" max="${r.inspected}" placeholder="${r.inspected}">
  <div style="font-size:10px;color:var(--c3);margin-top:5px">Credit = approved_qty × ₹${s.unit_price} + ${s.gst_rate}% GST</div></div>`:''

  document.getElementById('pb').innerHTML=tl+mW+fW+cnBlock+dets+form;

  let ft=`<button class="btn btn-ghost" onclick="closePanel()">Close</button>`;
  if(canI)ft+=`<button class="btn btn-warn" onclick="doInspect('${r.id}')">Save Inspection</button>`;
  if(canA)ft+=`<button class="btn btn-primary" style="flex:1" onclick="doApprove('${r.id}')">Approve & Issue Credit</button>`;
  if(canRej)ft+=`<button class="btn btn-danger" onclick="doReject('${r.id}')">Reject</button>`;
  document.getElementById('pf').innerHTML=ft;
}

function doInspect(id){
  const r=returns.find(x=>x.id===id),q=parseInt(document.getElementById('piq')?.value);
  if(!r||isNaN(q)||q<0){toast('Enter valid quantity','r');return;}
  if(q>r.claimed){toast('Cannot exceed claimed','r');return;}
  r.inspected=q;r.status='INSPECTED';
  toast(`Inspection saved — ${q}/${r.claimed} verified`);renderPanel();render();
}
function doApprove(id){
  const r=returns.find(x=>x.id===id),q=parseInt(document.getElementById('paq')?.value)||r.inspected;
  if(!r||q<0||q>r.inspected){toast('Invalid quantity','r');return;}
  const s=skuO(r.sku);r.approved=q;r.status='CREDIT_ISSUED';
  const net=q*s.unit_price,gst=parseFloat((net*s.gst_rate/100).toFixed(2)),total=parseFloat((net+gst).toFixed(2));
  const cid='CN-2604-00'+(creditNotes.length+1);
  creditNotes.push({id:cid,ret:id,retailer:r.retailer,rd:r.rd,rd_id:r.rd_id,dc:r.dc,qty:q,unit_price:s.unit_price,gst_rate:s.gst_rate,net,gst_amt:gst,total,status:'ISSUED',date:'Apr 17'});
  toast(`${cid} issued — ₹${fmt(total)} · WhatsApp to ${r.retailer}`);renderPanel();render();
}
function doReject(id){
  const r=returns.find(x=>x.id===id);if(!r)return;
  r.status='REJECTED';toast(`${id} rejected · Retailer notified`,'r');closePanel();render();
}

setRoleCSS();

</script>
